<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>2FA 驗證碼工具</title>
    <meta name="description" content="純前端 2FA / TOTP 驗證碼工具，支援多帳戶、QR Code 掃描、歷史記錄。" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <!-- Hero -->
      <div class="hero">
        <div class="hero-logo">2F</div>
        <div class="hero-text">
          <h1>2FA 驗證碼工具</h1>
          <p>所有計算都在瀏覽器內完成，不會進行任何網路請求。支援多帳戶管理與 QR Code。</p>
        </div>
      </div>

      <!-- Dashboard -->
      <div class="dashboard">
        <!-- Left: Input -->
        <div class="card action-card">
          <div class="card-title">設定</div>
          <div class="action-group">
            <div>
              <label for="secret">Base32 祕鑰</label>
              <textarea id="secret" rows="2" placeholder="JBSWY3DPEHPK3PXP" autocomplete="off"></textarea>
            </div>
            <div>
              <label for="account-name">帳戶名稱（選填）</label>
              <input id="account-name" placeholder="user@example.com" />
            </div>
            <div class="row">
              <div>
                <label for="algorithm">演算法</label>
                <select id="algorithm">
                  <option value="SHA-1" selected>SHA-1</option>
                  <option value="SHA-256">SHA-256</option>
                  <option value="SHA-512">SHA-512</option>
                </select>
              </div>
              <div>
                <label for="digits">位數</label>
                <select id="digits">
                  <option value="6" selected>6</option>
                  <option value="8">8</option>
                </select>
              </div>
              <div>
                <label for="period">週期</label>
                <select id="period">
                  <option value="30" selected>30s</option>
                  <option value="60">60s</option>
                </select>
              </div>
              <div>
                <label for="skew">誤差</label>
                <select id="skew">
                  <option value="0">0</option>
                  <option value="1" selected>±1</option>
                  <option value="2">±2</option>
                </select>
              </div>
            </div>
            <div class="action-row">
              <button class="btn-primary" id="save-account" type="button">儲存帳戶</button>
              <button class="btn-secondary" id="parse-uri" type="button">匯入 otpauth URI</button>
            </div>
            <div>
              <label for="code">驗證代碼</label>
              <div class="row" style="grid-template-columns: 1fr auto;">
                <input id="code" inputmode="numeric" placeholder="123456" autocomplete="one-time-code" />
                <button class="btn-secondary" id="verify" type="button">驗證</button>
              </div>
              <div id="status" class="status bad" style="margin-top: 10px;">等待輸入</div>
            </div>
          </div>
        </div>

        <!-- Right: Result -->
        <div style="display:flex;flex-direction:column;gap:20px;">
          <div class="card result-card">
            <div class="card-title">驗證碼</div>
            <div class="token-row">
              <div id="token" class="code-display inactive">------</div>
            </div>
            <div class="progress"><span id="progress-bar"></span></div>
            <div style="display:flex;gap:8px;margin-top:14px;justify-content:center;">
              <button class="btn-icon" id="copy" type="button" title="複製驗證碼">📋</button>
            </div>
          </div>
          <div class="meta-grid">
            <div class="meta-pill">
              <div class="label">時間戳</div>
              <div class="value" id="epoch">—</div>
            </div>
            <div class="meta-pill">
              <div class="label">計數</div>
              <div class="value" id="counter">—</div>
            </div>
            <div class="meta-pill">
              <div class="label">剩餘</div>
              <div class="value" id="next">—</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Bottom: History + QR -->
      <div class="bottom-grid">
        <div class="card history-card">
          <div class="card-title">歷史帳戶</div>
          <div id="history-list" class="history-list">
            <span class="empty-hint">尚無儲存的帳戶</span>
          </div>
        </div>

        <div class="card qr-card">
          <div class="card-title">QR Code</div>
          <div class="qr-body">
            <div class="qr-frame" id="qr-output"></div>
            <video id="qr-video" style="display:none;" playsinline aria-label="QR Code 掃描預覽"><track kind="captions" /></video>
            <div class="qr-actions">
              <button class="btn-secondary" id="qr-generate" type="button">產生 QR Code</button>
              <button class="btn-secondary" id="qr-scan" type="button">掃描 QR Code</button>
              <button class="btn-danger" id="qr-stop" type="button" style="display:none;">停止掃描</button>
            </div>
          </div>
        </div>
      </div>

      <!-- otpauth URI Modal (hidden) -->
      <dialog id="uri-dialog" class="card" style="max-width:480px;width:90%;">
        <div class="card-title">匯入 otpauth:// URI</div>
        <div class="action-group">
          <div>
            <label for="uri-input">URI</label>
            <textarea id="uri-input" rows="3" placeholder="otpauth://totp/Example:user@example.com?secret=JBSWY3DPEHPK3PXP&issuer=Example"></textarea>
          </div>
          <div class="action-row">
            <button class="btn-primary" id="uri-confirm" type="button">匯入</button>
            <button class="btn-secondary" id="uri-cancel" type="button">取消</button>
          </div>
        </div>
      </dialog>
    </main>

    <footer class="app-footer">
      <div class="footer-inner">使用 Web Crypto API，可在現代瀏覽器離線運作。</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
